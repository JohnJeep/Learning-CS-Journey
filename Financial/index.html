<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金融与财务 | John Jeep</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f5f6fa;
      color: #2d3436;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #eee;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header a { text-decoration: none; color: #636e72; font-size: 14px; }
    header a:hover { color: #00b894; }
    header .sep { color: #b2bec3; }
    header .current { color: #2d3436; font-weight: 600; }
    main {
      flex: 1;
      max-width: 860px;
      margin: 48px auto;
      padding: 0 24px;
      width: 100%;
    }
    .hero {
      background: linear-gradient(135deg, #55efc4 0%, #00b894 100%);
      border-radius: 12px;
      padding: 48px 40px;
      color: #fff;
      margin-bottom: 40px;
    }
    .hero h1 { font-size: 32px; font-weight: 700; margin-bottom: 12px; }
    .hero p { font-size: 16px; opacity: 0.9; line-height: 1.7; }
    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #2d3436;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #55efc4;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 24px;
      border: 1px solid #eee;
      transition: box-shadow 0.2s, transform 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover {
      box-shadow: 0 6px 20px rgba(0, 184, 148, 0.12);
      transform: translateY(-2px);
    }
    .card .icon { font-size: 28px; margin-bottom: 12px; }
    .card h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .card p { font-size: 13px; color: #636e72; line-height: 1.6; }
    .empty-notice {
      background: #fff;
      border-radius: 10px;
      border: 2px dashed #b2bec3;
      padding: 40px;
      text-align: center;
      color: #636e72;
    }
    .empty-notice p { margin-bottom: 8px; }
    .empty-notice code {
      background: #f5f6fa;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 13px;
      color: #00b894;
    }
    footer {
      text-align: center;
      padding: 24px;
      font-size: 13px;
      color: #b2bec3;
    }
    footer a { color: #55efc4; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <a href="/">首页</a>
    <span class="sep">›</span>
    <a href="/columns/">专栏</a>
    <span class="sep">›</span>
    <span class="current">金融与财务</span>
  </header>

  <main>
    <div class="hero">
      <h1>金融与财务</h1>
      <p>财务报告分析、投资基础知识与金融工具使用的学习笔记，建立系统化的财务思维框架。</p>
    </div>

    <h2 class="section-title">文章列表</h2>

        <p>如何阅读和分析上市公司财务报告。</p>
      </a>

    <div class="empty-notice">
      <p>暂无文章，内容持续更新中。</p>
      <p>添加新文章：在 <code>Financial/</code> 目录下创建 <code>.html</code> 文件并推送到 master 即可自动部署。</p>
    </div>
  </main>

  <footer>
    <a href="/">← 返回博客首页</a> &nbsp;·&nbsp; John Jeep's Learning Journey
  </footer>
</body>
</html>
